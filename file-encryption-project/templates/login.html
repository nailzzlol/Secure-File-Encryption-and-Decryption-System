<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🔐 Secure Login</h1>

            <form method="POST" autocomplete="off">

                <input
                    type="text"
                    name="username"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    autocomplete="off"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            {% if message %}
                <p class="message">
                    {{ message }}
                </p>
            {% endif %}

            <p style="margin-top:20px;">
                Username: admin
                <br>
                Password: 1234
            </p>

        </div>

    </div>

</body>
</html>
