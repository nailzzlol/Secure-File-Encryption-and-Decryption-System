<!DOCTYPE html>
<html>

<head>
    <title>OTP Verification</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🔐 OTP Verification</h1>

            <form method="POST">

                <input
                    type="text"
                    name="otp"
                    placeholder="Enter OTP"
                    required
                >

                <button type="submit">
                    Verify OTP
                </button>

            </form>

            {% if message %}
                <p class="message">
                    {{ message }}
                </p>
            {% endif %}

            <p style="margin-top:20px;">
                OTP is displayed in terminal for demo purposes.
            </p>

        </div>

    </div>

</body>
</html>
